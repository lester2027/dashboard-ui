<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Log in Page</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link rel="stylesheet" href="fblogin.css" />
  </head>
  <body>
    <main class="container">
      <h1 class="title center">Login</h1>
      <input
        type="email"
        id="name"
        name="email"
        placeholder="Email"
        required
        class="input"
      />
      <input
        type="text"
        id="password"
        name="password"
        placeholder="Password"
        required
        class="input"
      />
      <p class="para center blue">Forget Password?</p>
      <button type="button" class="log-in-btn btn">Login</button>
      <p class="para center">
        Do you have account? <span class="blue">Signup</span>
      </p>
      <div class="divider">
        <span class="or center">Or</span>
      </div>
      <button type="button" class="facebook-btn btn bottom-btn">
        <i class="fa-brands fa-facebook icon"></i>
        <span>Login with Facebook</span>
      </button>
      <button type="button" class="google-btn btn bottom-btn">
        <i class="fa-brands fa-google icon"></i> <span>Login with Google</span>
      </button>
    </main>
  </body>
</html>
