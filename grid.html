<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="grid.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>
  <body>
    <main class="container">
      <div class="header">
        <div class="header-item">
          <div class="header-text">
            <p>LesterDev</p>
          </div>

          <div class="header-icon">
            <a href="#">
              <i class="fa-solid fa-share" tabindex="0"></i>
            </a>
            <a href="#" class="icon-badge">
              <i class="fa-solid fa-comment-dots" tabindex="0"></i>
              <span class="badge active"></span>
            </a>
            <a href="#" class="icon-badge">
              <i class="fa-solid fa-bell" tabindex="0"></i>
              <span class="badge active"></span>
            </a>
          </div>

          <div class="header-line"></div>

          <button id="theme-switch">
            <i class="fa-solid fa-moon"></i>
            <i class="fa-solid fa-sun"></i>
          </button>

          <div class="search-item">
            <search>
              <form>
                <i class="fa-solid fa-magnifying-glass"></i>
                <input name="search" id="search" placeholder="Search" />
              </form>
            </search>
          </div>
        </div>
      </div>

      <section class="banner">
        <div class="banner-item">
          <div class="banner-title">
            <h2>Dashboard</h2>
          </div>
        </div>
      </section>

      <!---------- SIDEBAR SECTION ---------->
      <section class="sidebar">
        <!-- HEAD -->
        <div class="menu-btn">
          <i class="fa-solid fa-angle-left"></i>
        </div>
        <div class="head">
          <div class="user-img">
            <img src="/assets/images/profile-alt.jpg" alt="" />
          </div>

          <div class="user-details">
            <p class="user-title">Full-Stack Developer</p>
            <p class="user-name">Lester Viloria</p>
          </div>
        </div>

        <hr class="line" />

        <!-- MAIN -->
        <div class="main">
          <p class="main-title">Main</p>
          <div class="menu">
            <div>
              <div class="menu-link" tabindex="0">
                <i class="fa-solid fa-house"></i>
                <a href="#" class="text">Dashboard</a>
              </div>
            </div>

            <div class="menu-item">
              <div class="menu-link" onclick="toggleMenu(this)" tabindex="0">
                <i class="fa-solid fa-user"></i>
                <a href="#" class="text">Audience</a>
                <i class="fa-solid fa-angle-down arrow"></i>
              </div>

              <ul class="submenu">
                <li tabindex="0"><a href="#">Visits</a></li>
                <li tabindex="0"><a href="#">Users</a></li>
              </ul>
            </div>

            <div>
              <div class="menu-link" tabindex="0">
                <i class="fa-solid fa-square-pen"></i>
                <a href="#" class="text">Posts</a>
              </div>
            </div>

            <div>
              <div class="menu-link" tabindex="0">
                <i class="fa-solid fa-calendar-days"></i>
                <a href="#" class="text">Schedule</a>
              </div>
            </div>

            <div class="menu-item">
              <div class="menu-link" onclick="toggleMenu(this)" tabindex="0">
                <i class="fa-solid fa-diagram-project"></i>
                <a href="#" class="text">Projects</a>
                <i class="fa-solid fa-angle-down arrow"></i>
              </div>

              <ul class="submenu">
                <li tabindex="0"><a href="#">Dashboard UI</a></li>
                <li tabindex="0"><a href="#">Portfolio Website</a></li>
                <li tabindex="0"><a href="#">Login UI</a></li>
              </ul>
            </div>
          </div>
        </div>

        <hr class="line" />

        <!-- SETTING -->
        <div class="setting">
          <p class="setting-title">Setting</p>
          <div class="setting-item" tabindex="0">
            <i class="fa-solid fa-gear"></i>
            <span>
              <a href="#" class="text">Settings</a>
            </span>
          </div>
        </div>

        <!-- ACCOUNT -->
        <div class="account">
          <p class="account-title">Account</p>
          <div class="account-list">
            <div class="account-item" tabindex="0">
              <i class="fa-solid fa-circle-info"></i>
              <span>
                <a href="#" class="text">Help</a>
              </span>
            </div>

            <div class="account-item" tabindex="0">
              <i class="fa-solid fa-right-from-bracket"></i>
              <span>
                <a href="#" class="text">Logout</a>
              </span>
            </div>
          </div>
        </div>
      </section>

      <section class="sidecards"></section>

      <section class="hero"></section>
    </main>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="grid.js"></script>
    <script type="text/javascript" src="darkmode.js" defer></script>
  </body>
</html>
